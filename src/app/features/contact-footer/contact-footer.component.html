<footer class="border-t border-slate-800 py-12 px-6">
    <div class="max-w-7xl mx-auto flex flex-col lg:flex-row items-center justify-between gap-8">

        <div class="text-center lg:text-left">
            <h3 class="text-2xl font-bold text-slate-200 mb-2">
                <span class="text-green-500 mr-2">>_</span>¿Hablamo$? <span class="text-cyan-400 animate-pulse">_</span>
            </h3>
            <p class="text-slate-400 font-mono text-sm max-w-xs md:max-w-md">
                > Listo para nuevos descubrimientos y retos arquitectónicos en Ciberseguridad y Full Stack.
            </p>
        </div>

        <div class="flex flex-col sm:flex-row items-center justify-center gap-6">
            <a [href]="'mailto:' + email"
                class="px-4 py-2 border border-slate-700 text-slate-400 hover:text-cyan-400 hover:border-cyan-400 transition-colors text-sm font-bold uppercase tracking-widest flex items-center justify-center w-full sm:w-auto">
                <div class="flex items-center gap-2">
                    <span class="text-lg leading-none flex items-center justify-center h-5 w-5">✉️</span>
                    <span>[ MSG: {{ email }} ]</span>
                </div>
            </a>

            <a [href]="'tel:' + phone.replace(' ', '')"
                class="px-4 py-2 border border-slate-700 text-slate-400 hover:text-cyan-400 hover:border-cyan-400 transition-colors text-sm font-bold uppercase tracking-widest flex items-center justify-center w-full sm:w-auto">
                <div class="flex items-center gap-2">
                    <span class="text-lg leading-none flex items-center justify-center h-5 w-5">📱</span>
                    <span>[ TEL: {{ phone }} ]</span>
                </div>
            </a>

            <!-- Guiño PDF -->
            <a href="Martinez_Valiente_Javier_2026.pdf" target="_blank"
                class="px-5 py-2 border border-cyan-500/50 bg-transparent text-cyan-400 hover:bg-cyan-500/10 hover:text-cyan-300 font-bold transition-all text-sm uppercase tracking-widest flex items-center justify-center w-full sm:w-auto group">
                <div class="flex items-center gap-2">
                    <span
                        class="text-lg leading-none flex items-center justify-center h-5 w-5 group-hover:animate-bounce">📄</span>
                    <span>[ DOWNLOAD ./CV.pdf ]</span>
                </div>
            </a>
        </div>

    </div>

    <div class="text-center mt-12 text-xs text-slate-600 font-mono uppercase tracking-widest">
        <p>&copy; 2026 Javier Martínez Valiente. Escrito meticulosamente con TypeScript estricto y Tailwind CSS.</p>
    </div>
</footer>
