<footer class="bg-gray-950 border-t border-gray-800 py-12 px-6">
    <div class="max-w-5xl mx-auto flex flex-col md:flex-row items-center justify-between gap-8">

        <div class="text-center md:text-left">
            <h3 class="text-2xl font-bold text-white mb-2">
                <span class="text-blue-500 mr-2">>_</span>¿Hablamo$? <span class="text-cyan-400 animate-pulse">_</span>
            </h3>
            <p class="text-gray-500 font-mono text-sm max-w-xs md:max-w-md">
                Listo para nuevos descubrimientos y retos arquitectónicos en Ciberseguridad y Full Stack.
            </p>
        </div>

        <div class="flex flex-col sm:flex-row items-center gap-4">
            <a [href]="'mailto:' + email"
                class="px-4 py-2.5 rounded-md bg-gray-900 border border-gray-700 text-gray-300 hover:text-cyan-400 hover:border-cyan-500 transition-colors flex items-center gap-2 text-sm font-medium shadow-sm w-full sm:w-auto justify-center">
                ✉️ {{ email }}
            </a>

            <a [href]="'tel:' + phone.replace(' ', '')"
                class="px-4 py-2.5 rounded-md bg-gray-900 border border-gray-700 text-gray-300 hover:text-cyan-400 hover:border-cyan-500 transition-colors flex items-center gap-2 text-sm font-medium shadow-sm w-full sm:w-auto justify-center">
                📱 {{ phone }}
            </a>

            <!-- Guiño PDF -->
            <a href="public/CV_Javier_Martinez.pdf" target="_blank"
                class="px-5 py-2.5 rounded-md bg-cyan-600 hover:bg-cyan-500 text-white font-bold transition-all flex items-center gap-2 text-sm shadow-[0_0_10px_rgba(8,145,178,0.5)] w-full sm:w-auto justify-center group">
                <span class="group-hover:animate-bounce">📄</span> Descargar CV PDF
            </a>
        </div>

    </div>

    <div class="text-center mt-12 text-xs text-gray-600 font-mono">
        <p>&copy; 2026 Javier Martínez Valiente. Escrito meticulosamente con TypeScript estricto y Tailwind CSS.</p>
    </div>
</footer>
